name: release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # create the Version Packages PR / tags
  pull-requests: write # open/update the Version Packages PR
  id-token: write # OIDC — npm trusted publishing (no NPM_TOKEN needed)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      # Node provides the npm CLI used for the actual publish. Trusted
      # publishing (OIDC) only works via `npm publish`, and needs npm >= 11.5.1.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      # changesets/action opens a "Version Packages" PR; on merge it runs the
      # publish script, which calls `changeset publish` (npm publish under the
      # hood). With id-token:write + a configured trusted publisher, npm
      # authenticates via OIDC and attaches provenance automatically.
      - uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
