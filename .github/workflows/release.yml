name: release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # create the Version Packages PR / tags
  pull-requests: write # open/update the Version Packages PR
  id-token: write # build provenance attestation (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      # npm CLI does the actual publish (changeset publish -> npm publish).
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      # One granular token scoped to @woodpecker-js publishes every package —
      # no per-package config. Provenance is still attached via id-token below.
      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$HOME/.npmrc"
      - uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
